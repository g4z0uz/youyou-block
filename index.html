<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouYou Block</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

#menu{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#050505;
}

button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:12px;
background:#111;
color:#00ffff;
font-size:18px;
box-shadow:0 0 15px #00ffff;
}

#game{
display:none;
}

#grid{
display:grid;
grid-template-columns:repeat(8,50px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.cell{
width:50px;
height:50px;
background:#111;
border-radius:8px;
}

.filled{
background:#00ffff;
box-shadow:0 0 10px #00ffff,0 0 30px #00ffff;
}

.preview{
background:#00ffff55;
}

#pieces{
margin-top:20px;
}

.piece{
display:inline-block;
padding:15px;
margin:6px;
background:#111;
border-radius:10px;
cursor:grab;
box-shadow:0 0 10px #ff00ff;
}

#lineFlash{
animation:flash 0.4s;
}

@keyframes flash{

0%{background:#00ffff}
50%{background:white}
100%{background:#111}

}

</style>
</head>

<body>

<div id="menu">

<h1>YOUYOU BLOCK</h1>

<button onclick="startGame()">Start</button>

</div>

<div id="game">

<h2>

Score <span id="score">0</span>  
Best <span id="best">0</span>

</h2>

<div id="grid"></div>

<div id="pieces">

<div class="piece" draggable="true" data-shape="line2">■■</div>
<div class="piece" draggable="true" data-shape="line3">■■■</div>
<div class="piece" draggable="true" data-shape="square">▣</div>
<div class="piece" draggable="true" data-shape="L">L</div>

</div>

</div>

<audio id="placeSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>

let size=8
let grid=[]
let score=0

let best=localStorage.getItem("youyouBest") || 0

document.getElementById("best").innerText=best

const gridDiv=document.getElementById("grid")

function startGame(){

document.getElementById("menu").style.display="none"

document.getElementById("game").style.display="block"

createGrid()

}

function createGrid(){

gridDiv.innerHTML=""
grid=[]

for(let i=0;i<size*size;i++){

let cell=document.createElement("div")
cell.className="cell"
cell.dataset.index=i

gridDiv.appendChild(cell)

grid.push(0)

}

}

function getCells(index,shape){

let cells=[]

if(shape=="line2")cells=[index,index+1]

if(shape=="line3")cells=[index,index+1,index+2]

if(shape=="square")cells=[index,index+1,index+size,index+size+1]

if(shape=="L")cells=[index,index+size,index+size+1]

return cells

}

document.querySelectorAll(".piece").forEach(piece=>{

piece.addEventListener("dragstart",e=>{

e.dataTransfer.setData("shape",piece.dataset.shape)

})

})

gridDiv.addEventListener("dragover",e=>{

e.preventDefault()

})

gridDiv.addEventListener("drop",e=>{

let shape=e.dataTransfer.getData("shape")

let rect=gridDiv.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

let col=Math.floor(x/56)
let row=Math.floor(y/56)

let index=row*size+col

let cells=getCells(index,shape)

for(let c of cells){

if(grid[c]==1)return

}

for(let c of cells){

grid[c]=1

gridDiv.children[c].classList.add("filled")

}

document.getElementById("placeSound").play()

score+=cells.length*10

checkLines()

updateScore()

})

function checkLines(){

for(let r=0;r<size;r++){

let full=true

for(let c=0;c<size;c++){

if(grid[r*size+c]==0)full=false

}

if(full){

for(let c=0;c<size;c++){

let cell=gridDiv.children[r*size+c]

cell.classList.add("lineFlash")

setTimeout(()=>{

grid[r*size+c]=0

cell.classList.remove("filled")

},200)

}

score+=100

}

}

}

function updateScore(){

document.getElementById("score").innerText=score

if(score>best){

best=score

localStorage.setItem("youyouBest",best)

document.getElementById("best").innerText=best

}

}

</script>

</body>
</html>
